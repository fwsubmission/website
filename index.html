<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fort Wayne Submission Fighting</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    /* Background */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url("fwsf-background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
    }

    /* Dark overlay for readability */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: -1;
    }

    /* Main content */
    .content {
      height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 15px;
      text-shadow: 2px 2px 10px black;
    }

    .subtitle {
      font-size: 20px;
      margin-bottom: 40px;
      color: #e0e0e0;
    }

    /* Social links */
    .socials {
      margin-bottom: 40px;
    }

    .socials p {
      margin: 10px 0;
      font-size: 18px;
    }

    .socials a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .socials a:hover {
      color: #cfcfcf;
    }

    /* Buttons container */
    .button-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Shared button styles */
    .btn {
      padding: 14px 34px;

      background: rgba(0, 0, 0, 0.75);
      color: white;

      border: 2px solid white;
      border-radius: 12px;

      text-decoration: none;
      font-size: 18px;
      font-weight: bold;

      transition: all 0.3s ease;

      backdrop-filter: blur(4px);
    }

    .btn:hover {
      background: white;
      color: black;
      transform: translateY(-3px);
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      h1 {
        font-size: 40px;
      }

      .subtitle {
        font-size: 16px;
      }

      .btn {
        width: 200px;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <!-- Background -->
  <div class="bg"></div>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Main content -->
  <div class="content">

    <h1>Fort Wayne Submission Fighting</h1>

    <p class="subtitle">
      Page is currently under construction.
    </p>

    <!-- Social links -->
    <div class="socials">

      <p>
        🔗 Instagram:
        <a href="https://www.instagram.com/fwsubmissionfighting/" target="_blank">
          FWSF Official Instagram
        </a>
      </p>

      <p>
        🔗 YouTube:
        <a href="https://www.youtube.com/@Fwsubmissionfighting" target="_blank">
          FWSF Official YouTube
        </a>
      </p>

    </div>

    <!-- Buttons -->
    <div class="button-group">

      <a href="about.html" class="btn">
        About
      </a>

      <a href="shop.html" class="btn">
        Shop
      </a>

    </div>

  </div>

</body>
</html>
